services:
  - type: web
    name: gst-ecom-ez-backend
    runtime: python
    buildCommand: pip install -r ez_filing-conflict_040726_1139/backend/requirements.txt
    startCommand: cd ez_filing-conflict_040726_1139/backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /api/health
