name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm --filter @workspace/gst-ecom-ez run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        run: |
          cd artifacts/gst-ecom-ez
          GIT_DIR=/dev/null npx wrangler pages deploy dist/public \
            --project-name=gst-ecom-ez \
            --branch=main \
            --commit-message="${{ github.event.head_commit.message || 'manual deploy' }}" \
            --commit-hash="${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: c1ebced89f0ab8555f5dc7c1766d8c55
