kind = "web"
previewPath = "/"
title = "GST-ECOM-EZ"
version = "1.0.0"
id = "artifacts/gst-ecom-ez"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24372

[services.development]
run = "pnpm --filter @workspace/gst-ecom-ez run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gst-ecom-ez", "run", "build" ]
publicDir = "artifacts/gst-ecom-ez/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24372"
BASE_PATH = "/"
